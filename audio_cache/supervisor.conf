[program:ai_server]
command=/home/qc/ai_server/ai_server/web -f conf/web.json
 # 启动命令
directory=/home/qc/ai_server/ai_server  # 工作目录
user=qc  # 运行程序的用户
autostart=true  # 自动启动
autorestart=true  # 自动重启
redirect_stderr=true
environment=CONDA_DEFAULT_ENV=latentsync,PATH="/home/qc/miniconda3/envs/latentsync1.5/bin:/home/qc/miniconda3/condabin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin:/home/qc/miniconda3/condabin:/home/qc/go/go/bin"
stdout_logfile=/home/qc/log/ai_server.log  # 标准输出日志文件

