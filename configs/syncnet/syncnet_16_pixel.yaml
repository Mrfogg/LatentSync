model:
  audio_encoder: # input (1, 80, 52)
    in_channels: 1
    block_out_channels: [ 32, 64, 128, 256, 512, 1024, 2048 ]
    downsample_factors: [ [ 2, 1 ], 2, 2, 1, 2, 2, [ 2, 3 ] ]
    attn_blocks: [ 0, 0, 0, 0, 0, 0, 0 ]
    dropout: 0.0
  visual_encoder: # input (48, 128, 256)
    in_channels: 48
    block_out_channels: [ 64, 128, 256, 256, 512, 1024, 2048, 2048 ]
    downsample_factors: [ [ 1, 2 ], 2, 2, 2, 2, 2, 2, 2 ]
    attn_blocks: [ 0, 0, 0, 0, 0, 0, 0, 0 ]
    dropout: 0.0

ckpt:
  resume_ckpt_path: checkpoints/latentsync_syncnet.pt
  inference_ckpt_path: /home/qc/ai_server/ai_server/LatentSync/debug/syncnet/train-2025_03_12-20:07:31/checkpoints/checkpoint-75000.pt
  save_ckpt_steps: 1000

data:
  train_output_dir: debug/syncnet
  num_val_samples: 500
  batch_size: 48 # 128
  num_workers: 11 # 11
  latent_space: false
  num_frames: 16
  resolution: 256
  train_fileslist: /home/qc/ai_server/ai_server/LatentSync/fileslist/train.txt
  train_data_dir: /data/high_visual_quality/train
  val_fileslist: /home/qc/ai_server/ai_server/LatentSync/fileslist/val.txt
  val_data_dir: /data/high_visual_quality/val
  audio_cache_dir: /home/qc/ai_server/ai_server/LatentSync/audio_cache/mel_new
  audio_mel_cache_dir: /home/qc/ai_server/ai_server/LatentSync/audio_cache/mel_new
  lower_half: true
  audio_sample_rate: 16000
  video_fps: 25

optimizer:
  lr: 1e-5
  max_grad_norm: 1.0

run:
  max_train_steps: 100000000
  validation_steps: 1000
  mixed_precision_training: true
  seed: 42
